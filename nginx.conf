# NotionNext 站点 Nginx 配置示例
# 请将 yourdomain.com 替换为你的实际域名

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 你的 server 配置
    server {
        listen 80;
        server_name www.freemium.cc;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name www.freemium.cc;

        ssl_certificate /etc/letsencrypt/live/www.freemium.cc/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.freemium.cc/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://127.0.0.1:3000; # 如果NotionNext监听3000端口请改为3000
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
} 